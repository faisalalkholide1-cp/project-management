<h2 mat-dialog-title>Confirm delete </h2>

<mat-dialog-content>
 Are you sure you want to delete it?
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="warn" (click)="confirm()">
    Delete
  </button>
</mat-dialog-actions>
